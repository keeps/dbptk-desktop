name: Staging

on: 
  repository_dispatch: 
    types: ["dispatch-staging"]
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Update package.json
        run: |
          cat package.json | jq ".version = \"$RELEASE_VERSION\"" | jq ".dbvtkVersion = \"$RELEASE_VERSION\"" > tmp
          mv tmp package.json
        env:
          RELEASE_VERSION: ${{ github.event.client_payload.version }}

      - name: Cache package.json
        uses: actions/cache/save@v4
        with:
          path: package.json
          key: ${{ github.event.client_payload.version }}-package.json-staging
          enableCrossOsArchive: true

  build:
    needs: preprocessing
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            arch: x64
          - os: windows-latest
            arch: x64
          - os: macos-latest
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Cache restore
        uses: actions/cache/restore@v4
        with:
          path: package.json
          key: ${{ github.event.client_payload.version }}-package.json-staging
          enableCrossOsArchive: true

      - name: Download WAR binary from GitHub artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: staging.yml
          branch: staging
          repo: keeps/dbptk-ui

      - name: Prepare WAR
        run: |
          mkdir -p resources/war
          mv artifact/dbvtk-staging.war resources/war/dbvtk.war
        shell: bash

      - name: Package
        run: yarn --link-duplicates --pure-lockfile && yarn dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DBPTK_UI_VERSION: ${{ github.event.client_payload.version }}
          FLOW: staging
          RUNNER_OS: ${{ runner.os }}
          RUNNER_ARCH: ${{ matrix.arch }}

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ runner.os }}-${{ matrix.arch }}
          path: |
            dist/*
            !dist/linux-unpacked/*
            !dist/win-unpacked/*
            !dist/win-ia32-unpacked/*
            !dist/mac/*
            !dist/mac-x64/*
            !dist/mac-arm64/*
            !dist/*.zip
            !dist/*.blockmap
            !dist/builder-debug.yml
          retention-days: 1